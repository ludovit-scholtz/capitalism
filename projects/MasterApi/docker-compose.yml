version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: master
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  masterapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
      - "44364:44364"
    depends_on:
      - postgres
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:44364;http://+:80
      - ConnectionStrings__MasterCatalog=Host=postgres;Database=master;Username=postgres;Password=password

volumes:
  postgres_data: