version: '3.8'

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: master
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data2

  masterapi:
    build:
      context: .
      dockerfile: MasterApi/Dockerfile
    ports:
      - "44364:44364"
    depends_on:
      - postgres
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:44364
      - ConnectionStrings__MasterCatalog=Host=postgres;Port=5432;Database=master;Username=postgres;Password=password

volumes:
  postgres_data:
