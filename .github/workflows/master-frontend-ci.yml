name: master-frontend CI

on:
  pull_request:
    paths:
      - 'projects/master-frontend/**'
      - '.github/workflows/master-frontend-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'projects/master-frontend/**'
      - '.github/workflows/master-frontend-ci.yml'

env:
  PROJECT_PATH: projects/master-frontend

jobs:
  build-test:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ env.PROJECT_PATH }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Type check & build
        run: npm run build
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Unit tests
        run: npm run test:unit
        working-directory: ${{ env.PROJECT_PATH }}

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ env.PROJECT_PATH }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Run E2E tests
        run: CI=true npx playwright test --project=chromium
        working-directory: ${{ env.PROJECT_PATH }}
        env:
          VITE_GRAPHQL_URL: http://localhost:9999/graphql

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-master-frontend-results
          path: ${{ env.PROJECT_PATH }}/playwright-report/
          retention-days: 7
