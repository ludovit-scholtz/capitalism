name: MasterApi CI

on:
  pull_request:
    paths:
      - 'projects/MasterApi/**'
      - 'projects/MasterApi.Tests/**'
      - '.github/workflows/master-api-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'projects/MasterApi/**'
      - 'projects/MasterApi.Tests/**'
      - '.github/workflows/master-api-ci.yml'

env:
  PROJECT_PATH: projects/MasterApi
  TESTS_PATH: projects/MasterApi.Tests

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ${{ env.TESTS_PATH }}

      - name: Build (Release)
        run: dotnet build ${{ env.TESTS_PATH }} --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test ${{ env.TESTS_PATH }} --configuration Release --no-build --logger "trx;LogFileName=results.trx" --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: masterapi-test-results
          path: TestResults/
          retention-days: 7
